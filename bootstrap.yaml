apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubernetes-gitops-platform-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/amarpal-singh5/kubernetes-gitops-platform.git
    targetRevision: main
    path: gitops/overlays/dev # Points exactly to your layout's dev overlay folder
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
