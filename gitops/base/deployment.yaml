apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubernetes-gitops-platform
  labels:
    app: kubernetes-gitops-platform
spec:
  replicas: 3
  selector:
    matchLabels:
      app: kubernetes-gitops-platform
  template:
    metadata:
      labels:
        app: kubernetes-gitops-platform
    spec:
      # Hardening Step 1: Pod-Level Security Context (Enforces non-root at runtime)
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999

      containers:
        - name: kubernetes-gitops-platform
          image: ghcr.io/amarpal-singh5/kubernetes-gitops-platform:latest
          ports:
            - containerPort: 5000
          
          # Hardening Step 2: Container-Level Capabilities (Immutable runtime)
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          # Hardening Step 3: Compute Resource Guardrails (Noisy neighbor protection)
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
