apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubernetes-gitops-platform

spec:
  replicas: 4 

  selector:
    matchLabels:
      app: kubernetes-gitops-platform

  template:
    metadata:
      labels:
        app: kubernetes-gitops-platform

    spec:
      containers:
        - name: kubernetes-gitops-platform
          image: ghcr.io/amarpal-singh5/kubernetes-gitops-platform:4fc77c80c596a38fd09dfb5f1ac172c6c04804c7
          ports:
            - containerPort: 5000

          readinessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 3
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
