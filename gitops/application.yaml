apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubernetes-gitops-platform
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/amarpal-singh5/kubernetes-gitops-platform.git
    targetRevision: main
    path: gitops

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
