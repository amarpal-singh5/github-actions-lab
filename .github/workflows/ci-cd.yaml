name: CI-CD Enterprise Pipeline

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'gitops/**'
      - 'README.md'
      - 'kind-config.yaml'
      - 'bootstrap.yaml'
      - '.dockerignore'
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'gitops/**'
      - 'README.md'
      - 'kind-config.yaml'
      - 'bootstrap.yaml'
      - '.dockerignore'

jobs:
  # ==========================================
  # JOB 1: CONTINUOUS INTEGRATION (PRs & Main)
  # ==========================================
  test:
    runs-on: ubuntu-latest
    # Does test need a condition? No! It runs on both by default, acting as our gatekeeper.
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python Runtime
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Runtime and Test Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/requirements.txt

      - name: Execute Unit Tests via Pytest
        run: |
          pytest src/

  # ==========================================
  # JOB 2: CONTINUOUS DELIVERY (Post-Merge Push ONLY)
  # ==========================================
  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    # This job will cleanly SKIP on PRs and ONLY execute post-merge
    if: github.event_name == 'push'
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # Tells GitHub to pull down the full history so rebasing works seamlessly
          fetch-depth: 0 

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Pristine Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ github.sha }}

      - name: Setup Kustomize CLI Engine
        uses: imranismail/setup-kustomize@v2

      - name: Update GitOps Kustomize Overlay Tag
        run: |
          cd gitops/overlays/dev
          kustomize edit set image ghcr.io/amarpal-singh5/kubernetes-gitops-platform=ghcr.io/${{ github.repository }}:${{ github.sha }}

      - name: Commit and Rebase-Push Manifest Changes to Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add gitops/overlays/dev/kustomization.yaml
          git commit -m "chore(deploy): upgrade dev image to ${{ github.sha }}" || echo "No changes"
          
          # Now that this only runs post-merge, rebase will cleanly fast-forward
          git pull --rebase origin main
          git push origin main
