name: CI-CD Enterprise Pipeline

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'gitops/**'
      - 'README.md'
      - 'kind-config.yaml'
      - 'bootstrap.yaml'
      - '.dockerignore'
  # Run the pipeline on PRs targeting main
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'gitops/**'
      - 'README.md'
      - 'kind-config.yaml'
      - 'bootstrap.yaml'
      - '.dockerignore'
jobs:
  # ==========================================
  # JOB 1: CONTINUOUS INTEGRATION (QUALITY GATE)
  # ==========================================
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python Runtime
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # Caches pip layers to speed up future runs

      - name: Install Runtime and Test Dependencies
        run: |
          python -m pip install --upgrade pip
          # Pytest is natively installed here via your requirements.txt
          pip install -r src/requirements.txt

      - name: Execute Unit Tests via Pytest
        run: |
          # Recursively discovers and executes all matching test files under src/
          # If a test fails, pytest exits with code 1, halting the pipeline instantly
          pytest src/

  # ==========================================
  # JOB 2: CONTINUOUS DELIVERY (BUILD & DEPLOY)
  # ==========================================
  build-and-push:
    runs-on: ubuntu-latest
    needs: test # CRITICAL: Gated tightly behind successful unit tests
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Mandatory for the new, isolated workspace runner

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Pristine Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ github.sha }}

      - name: Setup Kustomize CLI Engine
        uses: imranismail/setup-kustomize@v2

      - name: Update GitOps Kustomize Overlay Tag
        run: |
          cd gitops/overlays/dev
          kustomize edit set image ghcr.io/amarpal-singh5/kubernetes-gitops-platform=ghcr.io/${{ github.repository }}:${{ github.sha }}

      - name: Commit and Rebase-Push Manifest Changes to Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add gitops/overlays/dev/kustomization.yaml
          git commit -m "chore(deploy): upgrade dev image to ${{ github.sha }}" || echo "No changes"
          
          # Handled as a documented known limitation for team scale;
          # natively avoids common branch drift via rebase mechanics
          git pull --rebase origin main
          git push origin main
